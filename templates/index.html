<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Kahoot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .ecran { display: none; } /* Ascundem toate ecranele implicit */
        .activ { display: flex; } /* Afișăm doar ecranul curent */
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-11/12 max-w-md text-center border-t-8 border-indigo-600">
        
        <div id="ecran-login" class="ecran activ flex-col">
            <h1 class="text-3xl font-bold text-indigo-700 mb-6">Kahoot Distribuit</h1>
            <input type="text" id="nume_jucator" placeholder="Numele tău" 
                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg mb-4 text-center text-lg focus:outline-none focus:border-indigo-500">
            <button onclick="intraInJoc()" 
                    class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                Intră în Joc
            </button>
        </div>

        <div id="ecran-intrebare" class="ecran flex-col">
            <h2 id="text_intrebare" class="text-2xl font-bold text-gray-800 mb-6">Întrebare...</h2>
            <div id="variante_container" class="flex flex-col gap-3">
                </div>
        </div>

        <div id="ecran-rezultat" class="ecran flex-col items-center justify-center py-10">
            <h2 id="text_rezultat" class="text-2xl font-bold"></h2>
        </div>

        <div id="ecran-asteptare" class="ecran flex-col items-center justify-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
            <h2 id="text_asteptare" class="text-xl text-gray-600 italic">Așteptăm...</h2>
        </div>

        <div id="ecran-clasament" class="ecran flex-col">
            <h1 class="text-3xl font-bold text-yellow-500 mb-6">🏆 Podium 🏆</h1>
            <ul id="lista_clasament" class="text-left bg-gray-50 p-4 rounded-lg border">
                </ul>
        </div>
        
    </div>

    <script>
        const socket = io();

        function schimbaEcran(idEcran) {
            document.querySelectorAll('.ecran').forEach(e => {
                e.classList.remove('activ');
            });
            document.getElementById(idEcran).classList.add('activ');
        }

        function intraInJoc() {
            const nume = document.getElementById('nume_jucator').value.trim();
            if(!nume) return alert("Introdu un nume!");
            
            socket.emit('conectare_nume', { nume: nume });
            schimbaEcran('ecran-asteptare');
            document.getElementById('text_asteptare').innerText = "Se caută liderul în rețea...";
        }

        function trimiteRaspuns(litera) {
            socket.emit('trimite_raspuns', { alegere: litera });
            schimbaEcran('ecran-asteptare');
            document.getElementById('text_asteptare').innerText = "Răspuns trimis! Evaluăm...";
        }

        socket.on('schimba_ecran', function(data) {
            if(data.ecran === 'intrebare') {
                document.getElementById('text_intrebare').innerText = data.date.text;
                const container = document.getElementById('variante_container');
                container.innerHTML = ""; 
                
                for(const [litera, text] of Object.entries(data.date.variante)) {
                    container.innerHTML += `
                        <button onclick="trimiteRaspuns('${litera}')" 
                                class="bg-gray-100 border-2 border-gray-300 text-gray-700 font-semibold py-3 px-4 rounded hover:bg-indigo-50 hover:border-indigo-500 transition text-left">
                            <span class="font-bold text-indigo-600 mr-2">${litera})</span> ${text}
                        </button>
                    `;
                }
                schimbaEcran('ecran-intrebare');
            } 
            else if(data.ecran === 'rezultat') {
                const el = document.getElementById('text_rezultat');
                el.innerText = data.mesaj;
                el.className = data.mesaj.includes("CORECT") ? "text-2xl font-bold text-green-500" : "text-2xl font-bold text-red-500";
                schimbaEcran('ecran-rezultat');
            }
            else if(data.ecran === 'asteptare') {
                document.getElementById('text_asteptare').innerText = data.mesaj;
                schimbaEcran('ecran-asteptare');
            }
            else if(data.ecran === 'clasament') {
                const ul = document.getElementById('lista_clasament');
                ul.innerHTML = "";
                let loc = 1;
                for(const [nume, scor] of Object.entries(data.clasament)) {
                    ul.innerHTML += `<li class="py-2 border-b last:border-0 font-semibold ${loc===1 ? 'text-xl text-yellow-600' : 'text-gray-700'}">
                        #${loc} ${nume} <span class="float-right">${scor} pct</span>
                    </li>`;
                    loc++;
                }
                schimbaEcran('ecran-clasament');
            }
        });
    </script>
</body>
</html>
